[package]
name = "code-buddy"
version = "0.1.0"
edition = "2021"

[lib]
name = "code_buddy_lib"
crate-type = ["staticlib", "cdylib", "lib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon", "image-png"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
async-trait = "0.1"
